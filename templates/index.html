<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Risk Analytics — Churn Core Engine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="dashboard-header">
            <div class="brand">
                <span class="logo-icon">📊</span>
                <h1>Churn<span class="accent">Intel</span></h1>
            </div>
            <p class="subtitle">Predictive Customer Retention Platform</p>
        </header>

        <main class="dashboard-grid">
            <section class="glass-card input-panel">
                <h3>Customer Metric Matrix</h3>
                <form id="prediction-form">
                    <div class="input-group">
                        <label>Age</label>
                        <input type="number" name="age" value="34" min="18" max="100" required>
                    </div>
                    <div class="input-group">
                        <label>Tenure (Months)</label>
                        <input type="number" name="tenure" value="5" min="0" max="120" required>
                    </div>
                    <div class="input-group">
                        <label>Monthly Charges ($)</label>
                        <input type="number" name="monthly_charges" value="89.90" step="0.01" required>
                    </div>
                    <div class="input-group">
                        <label>Contract Type</label>
                        <select name="contract">
                            <option value="Month-to-month">Month-to-month</option>
                            <option value="One year">One year</option>
                            <option value="Two year">Two year</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Payment Method</label>
                        <select name="payment_method">
                            <option value="Electronic check">Electronic check</option>
                            <option value="Mailed check">Mailed check</option>
                            <option value="Bank transfer">Bank transfer</option>
                            <option value="Credit card">Credit card</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Premium Tech Support</label>
                        <select name="tech_support">
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Paperless Billing</label>
                        <select name="paperless_billing">
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Execute Risk Assessment</button>
                </form>
            </section>

            <section class="glass-card output-panel">
                <h3>Diagnostic Summary</h3>
                <div id="placeholder-view" class="center-content">
                    <p>Provide customer attributes to trigger model evaluations.</p>
                </div>
                
                <div id="results-view" class="hidden">
                    <div class="risk-gauge-container">
                        <div class="risk-value" id="risk-pct">0.0%</div>
                        <p class="risk-label">Churn Attrition Probability</p>
                    </div>
                    <div class="status-badge" id="risk-badge">LOW RISK</div>
                    
                    <div class="explainability-block">
                        <h4>SHAP Analytical Drivers:</h4>
                        <ul id="driver-list" class="driver-tags"></ul>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        document.getElementById('prediction-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            
            if(data.success) {
                document.getElementById('placeholder-view').classList.add('hidden');
                document.getElementById('results-view').classList.remove('hidden');
                
                document.getElementById('risk-pct').innerText = `${data.probability}%`;
                const badge = document.getElementById('risk-badge');
                badge.innerText = `${data.churn_risk} RISK`;
                
                if(data.churn_risk === 'High') {
                    badge.className = 'status-badge risk-high';
                } else {
                    badge.className = 'status-badge risk-low';
                }
                
                const list = document.getElementById('driver-list');
                list.innerHTML = '';
                data.drivers.forEach(d => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${d.feature}</span> <strong>${d.impact > 0 ? '↑' : '↓'}</strong>`;
                    list.appendChild(li);
                });
            }
        });
    </script>
</body>
</html>
