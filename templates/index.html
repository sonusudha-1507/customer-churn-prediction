<!DOCTYPE html>
<html>
<head>

<title>ChurnAI Intelligence Platform</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>


<body>


<div class="background">
    <span></span>
    <span></span>
    <span></span>
</div>


<header>

<h1>
Customer Churn 
<span>AI Engine</span>
</h1>

<p>
Machine Learning • Explainable AI • Risk Intelligence
</p>

</header>



<main class="container">


<section class="glass input-card">

<h2>Customer Profile</h2>


<form id="prediction-form">


<input 
type="number"
name="age"
placeholder="Age"
required>


<input 
type="number"
name="tenure"
placeholder="Tenure Months"
required>


<input
type="number"
step="0.01"
name="monthly_charges"
placeholder="Monthly Charges"
required>


<select name="contract">

<option>
Month-to-month
</option>

<option>
One year
</option>

<option>
Two year
</option>

</select>



<select name="payment_method">

<option>
Electronic check
</option>

<option>
Credit card
</option>

<option>
Bank transfer
</option>

<option>
Mailed check
</option>

</select>


<select name="tech_support">

<option>No</option>

<option>Yes</option>

</select>



<select name="paperless_billing">

<option>Yes</option>

<option>No</option>

</select>


<button>
Analyze Customer
</button>


</form>


</section>




<section class="glass result-card">

<h2>
AI Prediction
</h2>


<div id="result">

<div class="circle">

<span id="probability">
0%
</span>

</div>


<h3 id="risk">
Waiting...
</h3>


<ul id="drivers">

</ul>


</div>


</section>


</main>



<script src="{{ url_for('static', filename='js/main.js') }}"></script>


</body>

</html>
